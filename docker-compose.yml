# ============================================
# TechStore - Docker Compose
# Stack: Backend + AI Service + Frontend
# Database: MongoDB Atlas (cloud) - no local MongoDB
# ============================================

services:
  # ==========================================
  # Python AI Recommendation Service
  # ==========================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: techstore-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - DATABASE_NAME=${DATABASE_NAME:-thietbidientu}
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8000
      - MODEL_SAVE_PATH=/app/model_data
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - BATCH_SIZE=256
      - NCF_EPOCHS=20
      - NCF_PATIENCE=5
      - SVD_N_FACTORS=50
      - INTERACTION_HALFLIFE_DAYS=30
      - TRAINING_INTERVAL_HOURS=24
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
    volumes:
      - ai_model_data:/app/model_data
      - ai_logs:/app/logs
    networks:
      - techstore-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ==========================================
  # Node.js Backend API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techstore-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5000}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - AI_SERVICE_URL=http://ai-service:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - ZALO_APP_ID=${ZALO_APP_ID}
      - ZALO_KEY1=${ZALO_KEY1}
      - ZALO_KEY2=${ZALO_KEY2}
      - ZALO_ENDPOINT=${ZALO_ENDPOINT}
      - ZALO_CALLBACK_URL=${ZALO_CALLBACK_URL}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - techstore-network
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # React Frontend (Production build served by nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000/api}
    container_name: techstore-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - techstore-network
    depends_on:
      backend:
        condition: service_healthy

# ==========================================
# Volumes
# ==========================================
volumes:
  ai_model_data:
    driver: local
  ai_logs:
    driver: local
  backend_uploads:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  techstore-network:
    driver: bridge
