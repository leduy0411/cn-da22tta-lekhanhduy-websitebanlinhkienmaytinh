# ============================================
# TechStore - Docker Compose
# Full Stack: MongoDB + Backend + AI Service + Frontend
# ============================================

version: '3.8'

services:
  # ==========================================
  # MongoDB Database
  # ==========================================
  mongodb:
    image: mongo:7.0
    container_name: techstore-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: thietbidientu
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - techstore-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================
  # Python AI Recommendation Service
  # ==========================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: techstore-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:admin123@mongodb:27017/thietbidientu?authSource=admin}
      - DATABASE_NAME=thietbidientu
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8000
      - MODEL_SAVE_PATH=/app/model_data
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - BATCH_SIZE=256
      - NCF_EPOCHS=20
      - NCF_PATIENCE=5
      - SVD_N_FACTORS=50
      - INTERACTION_HALFLIFE_DAYS=30
      - TRAINING_INTERVAL_HOURS=24
    volumes:
      - ai_model_data:/app/model_data
      - ai_logs:/app/logs
    networks:
      - techstore-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ==========================================
  # Node.js Backend API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techstore-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:admin123@mongodb:27017/thietbidientu?authSource=admin}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - AI_SERVICE_URL=http://ai-service:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - techstore-network
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: node -e "require('http').get('http://localhost:5000/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # React Frontend (Production build served by nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techstore-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    networks:
      - techstore-network
    depends_on:
      backend:
        condition: service_healthy

# ==========================================
# Volumes
# ==========================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  ai_model_data:
    driver: local
  ai_logs:
    driver: local
  backend_uploads:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  techstore-network:
    driver: bridge
